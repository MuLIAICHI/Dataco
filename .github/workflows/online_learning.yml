name: Online Learning Pipeline

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows you to manually trigger the pipeline from the GitHub UI

permissions:
  contents: write # Important: Needed to push the updated model_state back to the repo

jobs:
  train-and-update-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Used to prevent infinite recursion if a commit triggers another action
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn requests joblib

      - name: Run Online Learning incremental update
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python src/online_learning.py

      - name: Commit and Push Updated Model State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: Saved new model_state from online learning run"
          file_pattern: "model_state/*"
          skip_dirty_check: false
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
